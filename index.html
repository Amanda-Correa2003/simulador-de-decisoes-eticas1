<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Decisões Éticas</title>
  <!-- Tailwind CSS para estilização moderna e responsiva -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 font-['Inter'] text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div id="app" class="w-full max-w-xl bg-slate-800 border border-slate-700 shadow-2xl rounded-2xl p-6 md:p-8 transition-all duration-300">
    <header class="mb-6 border-b border-slate-700 pb-4 flex justify-between items-center">
      <h1 class="text-xl md:text-2xl font-bold text-emerald-400 flex items-center gap-2">
        ⚖️ Simulador de Decisões Éticas
      </h1>
      <span id="contador-etapa" class="text-xs bg-slate-700 text-slate-300 px-3 py-1 rounded-full font-medium">Fase 1</span>
    </header>

    <!-- Área da História com Animação -->
    <main class="space-y-6">
      <div id="texto" class="text-lg md:text-xl text-slate-200 leading-relaxed bg-slate-900/50 p-5 rounded-xl border border-slate-700/50 animate-fade-in">
        <!-- O texto dinâmico entra aqui -->
      </div>

      <!-- Opções de Escolha -->
      <div id="opcoes" class="space-y-3">
        <!-- Os botões dinâmicos entram aqui -->
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
